        <script>
            const params = new URLSearchParams(window.location.search);
            const category = params.get("category");

            const content = document.getElementById("content");
            if (category === "planets") {
                content.innerHTML = `
                <h1>Planets</h1>
                <div class="exp box">
                    <h2>What is a Planet?</h2>
                    <p>A planet is a large celestial body that orbits a star, such as the Sun.
It does not produce its own light but reflects the light of its star.
Planets are usually spherical due to their gravity.
They can have moons, atmospheres, and different surface conditions.</p>
                </div>
                <h3>Solar System Planets</h3>
                <h4>Our solar system consists of the Sun and eight officially recognized planets. They are divided into two main categories: the rocky inner planets (Mercury, Venus, Earth, and Mars) and the gaseous/icy outer planets (Jupiter, Saturn, Uranus, and Neptune), separated by the main asteroid belt.</h4>
                <div class="main">
                    <div class="item">
                        <a href="planets.html?category=mercury">
                            <img src="Mercury_in_true_color.jpg" class="img-mercury">
                            <div class="label">Mercury</div>
                        </a>
                    </div>

                     <div class="item">
                        <a href="planets.html?category=venus">
                            <img src="venus-mariner-10-pia23791-fig2-16x9-1.jpg" class="img-venus">
                            <div class="label">Venus</div>
                         </a>
                    </div>

                    <div class="item">
                        <a href="planets.html?category=earth">
                            <img src="earth1.jpg" class="img-earth">
                            <div class="label">Earth</div>
                        </a>
                    </div>

                    <div class="item">
                        <a href="planets.html?category=mars">
                            <img src="photo-1770723963970-ace02c7db50e.avif" class="img-mars">
                            <div class="label">Mars</div>
                        </a>
                    </div>

                    <div class="item">
                        <a href="planets.html?category=jupiter">
                            <img src="Jupiter_against_black_background_of_space.jpeg" class="img-jupiter">
                            <div class="label">Jupiter</div>
                        </a>
                    </div>

                    <div class="item">
                        <a href="planets.html?category=saturn">
                            <img src="PIA17474~large.jpg" class="img-saturn">
                            <div class="label">Saturn</div>
                        </a>
                    </div>

                    <div class="item">
                        <a href="planets.html?category=uranus">
                            <img src="uranus.jpg" class="img-uranus">
                            <div class="label">Uranus</div>
                        </a>
                    </div>

                    <div class="item">
                        <a href="planets.html?category=neptune">
                            <img src="photo-1614313913007-2b4ae8ce32d6.avif" class="img-neptun">
                            <div class="label">Neptune</div>
                        </a>
                    </div>
                </div>
                <h3>Dwarf Planets</h3>
                <h4>A dwarf planet is a celestial body orbiting the Sun that is massive enough to be rounded by its own gravity but has not cleared its orbital neighborhood of other debris.</h4>
                <div class="grid">
                    <div class="card">
                        <img src="crop_p_color2_enhanced_release_small.webp" class="img-pluto" />
                        <div class="card-body">
                            <div class="card-title">Pluto</div>
                            <div class="card-desc">The most famous dwarf planet. It was formerly considered the ninth major planet until its reclassification in 2006. It is located in the icy Kuiper Belt and has five known moons.</div>
                        </div>
                    </div>
                    <div class="card">
                        <img src="pia21906-ceres-full-globe-1280x900-1.webp" class="card-img" />
                        <div class="card-body">
                            <div class="card-title">Ceres</div>
                            <div class="card-desc">The only dwarf planet located in the inner solar system, residing in the main asteroid belt between Mars and Jupiter. It is the smallest and closest of the five to the Sun.</div>
                        </div>
                    </div>
                    <div class="card">
                        <img src="Eris_icy-dwarf-planet_kuiper-belt_1m.jpg" class="card-img" />
                        <div class="card-body">
                            <div class="card-title">Eris</div>
                            <div class="card-desc">The most massive and second-largest known dwarf planet. Its discovery in 2005 actually prompted the IAU to create the "dwarf planet" classification. It orbits the Sun in the distant Kuiper Belt.</div>
                        </div>
                    </div>
                    <div class="card">
                        <img src="Haumea_1050x700.avif" class="card-img" />
                        <div class="card-body">
                            <div class="card-title">Haumea</div>
                            <div class="card-desc">A highly elongated, football-shaped dwarf planet. Located in the Kuiper Belt, it spins so fast that a single "day" lasts just 4 hours, and it even possesses its own ring system.</div>
                        </div>
                    </div>
                    <div class="card">
                        <img src="Makemake.jpg" class="img-makemake" />
                        <div class="card-body">
                            <div class="card-title">Makemake</div>
                            <div class="card-desc"> A large, extremely bright dwarf planet in the Kuiper Belt. It is second only to Pluto in brightness when viewed from Earth and has one tiny, faint moon.</div>
                        </div>
                    </div>
                </div>
                <h3>Expo Planets</h3>
                <h4>An exoplanet is any planet that exists outside our Solar System. The vast majority orbit distant stars, but some free-floating "rogue planets" drift through deep space untethered to any star. Here is the most well-known ones;</h4>
                <div class="grid">
                    <div class="card">
                        <img src="Dimidium.webp" class="img-pluto" />
                        <div class="card-body">
                            <div class="card-title">52 Pegasi b</div>
                            <div class="card-desc">A milestone in astronomy. Discovered in 1995, it was the first confirmed exoplanet to be found orbiting a sun-like star.</div>
                        </div>
                    </div>
                    <div class="card">
                        <img src="decided-to-make-a-render-of-an-ideal-proxima-centauri-b-v0-ebwgyenfyatg1.webp" class="img-pluto" />
                        <div class="card-body">
                            <div class="card-title">Proxima Centauri b</div>
                            <div class="card-desc">The closest known exoplanet to Earth. At just 4 light-years away, this Earth-sized world orbits in its red dwarf star's habitable zone.</div>
                        </div>
                    </div>
                    <div class="card">
                        <img src="TRAPPIST-1e.png" class="img-pluto" />
                        <div class="card-body">
                            <div class="card-title">TRAPPIST-1e</div>
                            <div class="card-desc">Part of a famous, tightly packed seven-planet system located 40 light-years away. It is often highlighted as one of the most promising potentially habitable worlds.</div>
                        </div>
                    </div>
                    <div class="card">
                        <img src="ab67616d0000b2732b913b7e50f4867971328a66.jpg" class="img-pluto" />
                        <div class="card-body">
                            <div class="card-title">Kepler-186f</div>
                            <div class="card-desc">One of the first Earth-size planets found in a star’s habitable zone.</div>
                        </div>
                    </div>
                    <div class="card">
                        <img src="Kepler-452b_art.jpg" class="img-pluto" />
                        <div class="card-body">
                            <div class="card-title">Kepler-452b</div>
                            <div class="card-desc">Often dubbed Earth's "older cousin." Discovered by the Kepler space telescope, this exoplanet orbits a star very similar to our Sun in the habitable zone.</div>
                        </div>
                    </div>
                </div>
                `;
            }
            else if (category === "moons") {
                content.innerHTML = `
                <h1>Moons</h1>
                <div class="exp box">
                    <h2>What is a Moon?</h2>
                    <p>A moon is a natural object that orbits a planet or another celestial body in space. Moons come in many different sizes and shapes, and some have atmospheres or even underground oceans.</p>
                </div>
                <h3>Earth's Moon: Luna</h3>
                <h4>Moon is Earth’s only natural satellite and the fifth-largest moon in the Solar System.</h4>
                <div class="main">
                    <div class="item">
                        <a href="planets.html?category=moon">
                            <img src="mooon.jpg" class="img-moon">
                            <div class="label">The Moon (Luna)</div>
                        </a>
                    </div>
                </div>
                <h3>Solar System Moons</h3>
                <h4>There are more than 900 moon in the Solar System. Here are some of most well-known ones:</h4>
                <div class="grid-moon">
                    <div class="card-moon">
                        <img src="phobos-pia10368-1920x1200-1.webp" class="img-phobos" />
                        <div class="card-body">
                            <div class="card-title">Phobos</div>
                            <div class="card-desc">One of Mars’ two moons, very close to the planet and slowly spiraling inward over time.</div>
                        </div>
                    </div>
                    <div class="card-moon">
                        <img src="jupiter-2.jpg" class="img-phobos" />
                        <div class="card-body">
                            <div class="card-title">Ganymede</div>
                            <div class="card-desc">The largest moon in the Solar System and a moon of Jupiter, even bigger than the planet Mercury.</div>
                        </div>
                    </div>
                    <div class="card-moon">
                        <img src="Europa.webp" class="img-phobos" />
                        <div class="card-body">
                            <div class="card-title">Europa</div>
                            <div class="card-desc">A moon of Jupiter with an icy surface and a strong possibility of a subsurface ocean beneath the ice.</div>
                        </div>
                    </div>
                    <div class="card-moon">
                        <img src="callisto.jpg" class="img-phobos" />
                        <div class="card-body">
                            <div class="card-title">Callisto</div>
                            <div class="card-desc">A heavily cratered moon of Jupiter, one of the oldest surfaces in the Solar System.</div>
                        </div>
                    </div>
                    <div class="card-moon">
                        <img src="PIA00583.jpg" class="img-phobos" />
                        <div class="card-body">
                            <div class="card-title">Io</div>
                            <div class="card-desc">A moon of Jupiter, known as the most volcanically active object in the Solar System due to intense tidal heating.</div>
                        </div>
                    </div>
                    <div class="card-moon">
                        <img src="titanglassnasa.webp" class="img-phobos" />
                        <div class="card-body">
                            <div class="card-title">Titan</div>
                            <div class="card-desc">Saturn’s largest moon, with a thick nitrogen-rich atmosphere and lakes of liquid methane.</div>
                        </div>
                    </div>
                    <div class="card-moon">
                        <img src="Enceladus - Cassini ISS NA Color Mosaic.png" class="img-phobos" />
                        <div class="card-body">
                            <div class="card-title">Enceladus</div>
                            <div class="card-desc">A moon of Saturn that ejects water ice jets from a hidden ocean beneath its icy crust.</div>
                        </div>
                    </div>
                    <div class="card-moon">
                        <img src="triton.jpg" class="img-phobos" />
                        <div class="card-body">
                            <div class="card-title">Triton</div>
                            <div class="card-desc">Neptune’s largest moon, unique for its retrograde orbit and active nitrogen geysers.</div>
                        </div>
                    </div>
                </div>
                `;
            }
            else if (category === "stars") {
                content.innerHTML = `
                <h1>Stars</h1>
                <div class="exp box">
                    <h2>What is a Star?</h2>
                    <p>Stars are giant, glowing spheres of hot gas (mostly hydrogen and helium) held together by their own gravity. At their cores, intense pressure and temperature ignite nuclear fusion, converting hydrogen into helium. This process releases massive amounts of energy, which radiates as the light and heat we see.</p>
                </div>
                <h3>Our Star : Sun</h3>
                <h4>The Sun is a medium-sized yellow star at the center of our Solar System, providing light and energy through nuclear fusion.</h4>
                <div class="main">
                    <div class="item">
                        <a href="planets.html?category=sun">
                            <img src="sun.jpg" class="img-sun">
                            <div class="label">Sun</div>
                        </a>
                    </div>
                </div>
                <h3>Stellar Evulation</h3>
                <h4>Stellar evolution is the process by which a star changes over billions of years. Governed primarily by a star's mass, the life cycle dictates its birth in a nebula, a stable period of nuclear fusion, and an explosive or gradual death that seeds the universe with heavy elements.</h4>
                <div class="stellar-evolution">
                    <!-- Stellar Nebula -->
                    <div class="phase-start">
                        <div class="phase-card" data-info="A stellar nebula is a massive interstellar cloud composed of hydrogen, helium, and dust particles. These regions are the birthplace of stars. Over time, gravity causes denser clumps to collapse, increasing pressure and temperature until nuclear fusion begins in the core, marking the formation of a protostar.">
                            <img src="nebula.jpg" class="img-nebula" alt="Stellar Nebula" />

                            <div class="phase-hover">
                                <h3>Stellar Nebula</h3>
                                <p>
                                    A giant cloud of gas and dust in space.
                                    Gravity pulls this material together,
                                    eventually forming a new star.
                                </p>
                            </div>

                            <div class="phase-label">Stellar Nebula</div>
                        </div>
                    </div>

                    <!-- Fork -->
                    <div class="fork">
                        <div class="fork-arrow left">
                            <div class="fork-line"></div>
                            <span>High Mass Star</span>
                        </div>

                        
                        <p class="info-text" id="mainSequenceText">Main Sequence</p>

                        

                        <p class="info-text2" id="giantPhaseText">Giant Phase</p>

                    

                        <p class="info-text3" id="remnantText">Remnant</p>

                        

                        <p class="info-text4" id="finalText">Final Phase</p>

                       

                        <div class="fork-arrow right">
                            <div class="fork-line"></div>
                            <span>Low / Mid Mass Star</span>
                        </div>
                    </div>


                    <!-- Two paths -->
                    <div class="paths">

                        <!-- High Mass Path -->
                        <div class="path1">

                            <div class="phase-card" data-info="Blue stars are extremely massive (8–150 solar masses), with very high surface temperatures (10,000–50,000°C). They burn hydrogen at a rapid rate, making them extremely luminous but short-lived, typically lasting only millions of years.">
                                <img src="s1-1024.jpg" alt="High Mass Star" />

                                <div class="phase-hover">
                                    <h3>Blue Stars</h3>
                                    <p>
                                        A massive blue-white star, 8–150 times
                                        the mass of the Sun. Burns extremely hot
                                        and fast, lasting only millions of years.
                                    </p>
                                </div>

                                <div class="phase-label">Blue Stars</div>
                            </div>

                            <div class="path-arrow">→</div>

                            <div class="phase-card" data-info="A red supergiant is a late evolutionary stage of a massive star after hydrogen in the core is exhausted. The core contracts while the outer layers expand dramatically, sometimes exceeding 1,000 times the Sun’s radius. Despite its enormous size, the surface temperature drops to about 3,000–4,500°C, giving it a red appearance. Heavier elements begin to fuse in the core until iron is formed.">
                                <img src="image_5156_2e-Antares.jpg" class="img-red" alt="Red Supergiant" />

                                <div class="phase-hover">
                                    <h3>Red Supergiant</h3>
                                    <p>
                                        When the star runs out of hydrogen fuel,
                                        it expands into a red supergiant —
                                        hundreds of times larger than the Sun.
                                    </p>
                                </div>

                                <div class="phase-label">Red Supergiant</div>
                            </div>

                            <div class="path-arrow">→</div>

                            <div class="phase-card" data-info="A supernova is a catastrophic explosion that occurs when a massive star’s core collapses under gravity after reaching iron. Since iron fusion consumes energy instead of releasing it, the core collapses rapidly, triggering a rebound shockwave. This explosion releases more energy in seconds than the Sun will emit in its entire lifetime and spreads heavy elements into space.">
                                <img src="supernova.jpg" alt="Supernova" />

                                <div class="phase-hover">
                                    <h3>Supernova</h3>
                                    <p>
                                        The star explodes in a massive
                                        supernova — one of the most powerful
                                        events in the universe, briefly
                                        outshining entire galaxies.
                                    </p>
                                </div>

                                <div class="phase-label">Supernova</div>
                            </div>

                            <div class="supernova-split">

                                <div class="split-branch left">
                                    <div class="diagonal-arrow">↙</div>

                                    <div class="phase-card" data-info="A neutron star is the ultra-dense remnant of a core-collapse supernova. It typically has a mass between 1.4 and 2.3 solar masses compressed into a sphere only about 10–15 km in radius. The density is so extreme that protons and electrons merge into neutrons, forming a matter state unique to these objects. A single teaspoon would weigh billions of tons on Earth.">
                                        <img src="What_is_a_neutron_star.jpg.jpg" alt="Neutron Star" />

                                        <div class="phase-hover">
                                            <h3>Neutron Star</h3>
                                            <p>After the supernova, the core collapses into an incredibly dense neutron star.</p>
                                        </div>

                                        <div class="phase-label">Neutron Star</div>
                                    </div>
                                
                                </div>

                                <div class="split-branch right">
                                    <div class="diagonal-arrow">↘</div>

                                    <div class="phase-card" data-info="A black hole forms when the collapsed core of a massive star exceeds the Tolman–Oppenheimer–Volkoff limit and no known force can stop gravitational collapse. The result is a singularity surrounded by an event horizon, where escape velocity exceeds the speed of light. It warps spacetime so strongly that time slows dramatically near its boundary..">
                                        <img src="black_hole_16x9_2.jpg" alt="Black Hole" />

                                        <div class="phase-hover">
                                            <h3>Black Hole</h3>
                                            <p>The most massive stars collapse into a black hole.</p>
                                        </div>

                                        <div class="phase-label">Black Hole</div>
                                    </div>
                                </div>

                            </div>

                            
                        </div>

                        <!-- Low / Mid Mass Path -->
                        <div class="path2">

                            <div class="phase-card" data-info="Red dwarfs and yellow stars are low to medium-mass main sequence stars. Red dwarfs are the smallest, coolest, and most common type of star, burning their fuel very slowly and lasting trillions of years. Yellow stars, like the Sun, are more massive and hotter, with surface temperatures around 5,000–6,000°C. These stars are stable during most of their lifetimes and form the baseline of stellar evolution.">
                                <img src="mainstar.jpg" class="img-main" alt="Main Sequence Star" />

                                <div class="phase-hover">
                                    <h3>Main Sequence</h3>
                                    <p>
                                        A smaller star like the Sun spends
                                        billions of years in the main sequence
                                        phase, steadily fusing hydrogen into
                                        helium.
                                    </p>
                                </div>

                                <div class="phase-label">Red and Yellow Stars</div>
                            </div>

                            <div class="path-arrow">→</div>

                            <div class="phase-card" data-info="A red giant forms when a star like the Sun exhausts hydrogen in its core. The core contracts while hydrogen fusion continues in a surrounding shell, causing the outer layers to expand massively. Surface temperature decreases, but luminosity increases due to size. The star can reach tens to hundreds of times its original radius.">
                                <img src="red-giant-star.png" class="img-red" alt="Red Giant" />

                                <div class="phase-hover">
                                    <h3>Red Giant</h3>
                                    <p>
                                        As the star runs out of hydrogen,
                                        it expands into a red giant,
                                        becoming cooler but much larger.
                                    </p>
                                </div>

                                <div class="phase-label">Red Giant</div>
                            </div>

                            <div class="path-arrow">→</div>

                            <div class="phase-card" data-info="A planetary nebula occurs when a red giant sheds its outer layers into space during the late stages of evolution. The exposed hot core emits ultraviolet radiation, ionizing the expelled gas and causing it to glow. Despite the name, it has no relation to planets; the term originated from its round, planet-like appearance in early telescopes.">
                                <img src="planetary.jpg" alt="Planetary Nebula" />

                                <div class="phase-hover">
                                    <h3>Planetary Nebula</h3>
                                    <p>
                                        The outer layers of the star drift away
                                        into space, forming a colorful
                                        planetary nebula.
                                    </p>
                                </div>

                                <div class="phase-label">Planetary Nebula</div>
                            </div>

                            <div class="path-arrow">→</div>

                            <div class="phase-card" data-info="A white dwarf is the final evolutionary stage of low and medium-mass stars. It is composed mostly of carbon and oxygen, supported by electron degeneracy pressure rather than nuclear fusion. With a mass comparable to the Sun but a radius similar to Earth, it is extremely dense and slowly cools over billions of years until it eventually becomes a black dwarf (theoretical).">
                                <img src="white.jpg" alt="White Dwarf" />

                                <div class="phase-hover">
                                    <h3>White Dwarf</h3>
                                    <p>
                                        The remaining core becomes a white
                                        dwarf — a small, dense stellar remnant
                                        slowly cooling over billions of years.
                                    </p>
                                </div>

                                <div class="phase-label">White Dwarf</div>
                            </div>

                        </div>
                    </div>
                </div>

                <div class="stellar-evolution-mobile">

  <!-- HIGH MASS PATH -->
  <h3 class="mobile-path-title">High Mass Star</h3>

  <div class="mobile-path">
    <div class="phase-card" data-info="A stellar nebula is a massive interstellar cloud composed of hydrogen, helium, and dust particles. These regions are the birthplace of stars.">
      <img src="nebula.jpg" class="img-nebula" alt="Stellar Nebula" />
      <div class="phase-hover"><h3>Stellar Nebula</h3><p>A giant cloud of gas and dust in space. Gravity pulls this material together, eventually forming a new star.</p></div>
      <div class="phase-label">Stellar Nebula</div>
    </div>
    <div class="path-arrow">→</div>
    <div class="phase-card" data-info="Blue stars are extremely massive (8–150 solar masses), burning hydrogen at a rapid rate, extremely luminous but short-lived.">
      <img src="s1-1024.jpg" alt="High Mass Star" />
      <div class="phase-hover"><h3>Blue Stars</h3><p>A massive blue-white star, 8–150 times the mass of the Sun.</p></div>
      <div class="phase-label">Blue Stars</div>
    </div>
    <div class="path-arrow">→</div>
    <div class="phase-card" data-info="A red supergiant forms when a massive star exhausts its hydrogen. It expands to hundreds of times the Sun's radius.">
      <img src="image_5156_2e-Antares.jpg" class="img-red" alt="Red Supergiant" />
      <div class="phase-hover"><h3>Red Supergiant</h3><p>Expands into a red supergiant hundreds of times larger than the Sun.</p></div>
      <div class="phase-label">Red Supergiant</div>
    </div>
    <div class="path-arrow">→</div>
    <div class="phase-card" data-info="A supernova is a catastrophic explosion releasing more energy in seconds than the Sun will emit in its entire lifetime.">
      <img src="supernova.jpg" alt="Supernova" />
      <div class="phase-hover"><h3>Supernova</h3><p>The star explodes in a massive supernova, briefly outshining entire galaxies.</p></div>
      <div class="phase-label">Supernova</div>
    </div>
    <div class="path-arrow">→</div>
    <div class="phase-card" data-info="A neutron star is the ultra-dense remnant of a core-collapse supernova. A teaspoon would weigh billions of tons.">
      <img src="What_is_a_neutron_star.jpg.jpg" alt="Neutron Star" />
      <div class="phase-hover"><h3>Neutron Star</h3><p>An incredibly dense remnant where a teaspoon weighs billions of tons.</p></div>
      <div class="phase-label">Neutron Star</div>
    </div>
    <div class="path-arrow">→</div>
    <div class="phase-card" data-info="A black hole forms when the collapsed core exceeds the limit where no known force can stop gravitational collapse.">
      <img src="black_hole_16x9_2.jpg" alt="Black Hole" />
      <div class="phase-hover"><h3>Black Hole</h3><p>A region where gravity is so strong that nothing, not even light, can escape.</p></div>
      <div class="phase-label">Black Hole</div>
    </div>
  </div>

  <!-- LOW MASS PATH -->
  <h3 class="mobile-path-title">Low / Mid Mass Star</h3>

  <div class="mobile-path">
    <div class="phase-card" data-info="A stellar nebula is a massive interstellar cloud composed of hydrogen, helium, and dust particles. These regions are the birthplace of stars.">
      <img src="nebula.jpg" class="img-nebula" alt="Stellar Nebula" />
      <div class="phase-hover"><h3>Stellar Nebula</h3><p>A giant cloud of gas and dust in space. Gravity pulls this material together, eventually forming a new star.</p></div>

                        <h4>The asteroid belt is a region of the Solar System populated by countless rocky and metallic bodies orbiting the Sun. It is one of the most important transition zones in planetary structure, separating the inner rocky planets from the outer gas and ice giants. This region preserves ancient material from the early formation of the Solar System.</h4>

                    <li><span>Kuiper Belt:</span> The Kuiper Belt is a vast, distant region beyond Neptune filled with icy bodies, dwarf planets, and remnants from the early Solar System. It is much larger and more spread out than the Main Asteroid Belt and includes well-known objects such as Pluto. This region represents the outer edge of the planetary system and transitions into interstellar space.</li>

      "mainSequenceText": {
        title: "Main Sequence",
        text: "The main sequence is the longest and most stable phase in a star's life cycle. During this stage, the star produces energy by fusing hydrogen into helium in its core. A balance between gravity and radiation pressure keeps the star stable. The duration of this phase depends on mass: massive stars live fast and short, while smaller stars can remain in this stage for billions to trillions of years."
      },
      "giantPhaseText": {
        title: "Giant Phase",
        text: "The giant phase occurs when a star runs out of hydrogen in its core. The core contracts while the outer layers expand significantly, causing the star to become much larger and cooler on the surface. Depending on the star's mass, this phase leads to either a red giant (low/medium mass stars) or a red supergiant (high mass stars)."
      },
      "remnantText": {
        title: "Remnant",
        text: "Stellar remnants are the final objects left after a star dies. Low and medium-mass stars become white dwarfs. Massive stars can form neutron stars. The most massive stars collapse further into black holes, regions of spacetime where gravity is so strong that not even light can escape."
      },
      "finalText": {
        title: "Final Phase",
        text: "The final phase depends on the star's mass. High-mass stars end their lives in a supernova explosion. Low and medium-mass stars instead shed their outer layers gradually, forming a planetary nebula. Both processes mark the end of active fusion in the star's life cycle."
      }
    };

    if (e.target.id && infoData[e.target.id]) {
      document.getElementById("popupTitle").textContent = infoData[e.target.id].title;
      document.getElementById("popupText").textContent = infoData[e.target.id].text;
      document.getElementById("popup").classList.add("active");
      return;

      document.getElementById("popup").classList.remove("active");
